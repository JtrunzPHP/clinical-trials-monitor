name: Clinical Trials Email Alerts

on:
  schedule:
    # 6:00 AM ET (EDT = UTC-4, so 10:00 UTC)
    # If you're in EST (winter), change to 11
    - cron: '0 10 * * *'

    # 6:00 PM ET (EDT = UTC-4, so 22:00 UTC)
    # If you're in EST (winter), change to 23
    - cron: '0 22 * * *'

  # Lets you trigger manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send email report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node send-report.js
