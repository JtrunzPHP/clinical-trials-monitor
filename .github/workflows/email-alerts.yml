name: Clinical Trials Email Alerts

on:
  schedule:
    # 6:00 AM ET (EDT = UTC-4, so 10:00 UTC)
    - cron: '0 10 * * *'
    # 6:00 PM ET (EDT = UTC-4, so 22:00 UTC)
    - cron: '0 22 * * *'

  # Manual trigger for testing
  workflow_dispatch:

# Need write permission to commit last-sent.json back to the repo
permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send email report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node send-report.js

      - name: Save dedup tracking file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-sent.json
          git diff --staged --quiet || git commit -m "Update last-sent.json [skip ci]"
          git push
